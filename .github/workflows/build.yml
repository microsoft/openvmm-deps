name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  cgmanifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Verify cgmanifest.json is in sync with Dockerfile
        run: python3 pkg/Tools/gen-cgmanifest.py --check

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: aarch64
          - architecture: x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up QEMU
        if: matrix.architecture == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.architecture }} outputs
        run: docker build --platform "${{ matrix.architecture }}" --output type=local,dest=out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.architecture }}
          path: out

  build-virtio-win:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build virtio-win
        run: docker build -f Dockerfile.virtio-win --output type=local,dest=out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtio-win
          path: out

  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build, build-virtio-win]
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: out

      - name: Build package
        run: |
          cd out
          mkdir package
          VERSION="0.3.0-${{ github.run_number }}"
          # To add a new test kernel, extend KERNELS below and follow the
          # `## Adding a new kernel version` recipe in pkg/linux/README.md
          # (new src-/build-/result- Dockerfile stages, sysroots/linux-<ver>/deps,
          # configs, cgmanifest refresh). The gh-release upload picks up
          # tarballs by glob, so no further workflow changes are required.
          KERNELS="6.1 6.18"
          for arch in x86_64 aarch64; do
            tar cvzf "package/openvmm-deps.$arch.$VERSION.tar.gz" \
              -C "$arch/openvmm-deps" .
            tar cvzf "package/openvmm-test-initrd.$arch.$VERSION.tar.gz" \
              -C "$arch/initrd" .
            for kver in $KERNELS; do
              tar cvzf "package/openvmm-test-linux-$kver.$arch.$VERSION.tar.gz" \
                -C "$arch/linux-$kver" .
            done
            tar cvzf "package/qemu-linux-static.$arch.$VERSION.tar.gz" \
              -C "$arch/qemu" .
          done
          # virtio-win is arch-independent (Windows PE binaries).
          tar cvzf "package/openvmm-test-virtio-win.$VERSION.tar.gz" \
            -C virtio-win .

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: "0.3.0-${{ github.run_number }}"
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            out/package/*.tar.gz
